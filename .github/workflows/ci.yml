name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  lint-and-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --all-extras --dev

      - name: Ruff lint
        run: uv run ruff check .

      - name: Ruff format check
        run: uv run ruff format --check .

      - name: Mypy
        run: uv run mypy .

      - name: Create .env for tests
        run: |
          cat > .env <<EOF
          BOT__TOKEN=test_token_does_not_matter
          POSTGRES__HOST=localhost
          POSTGRES__PORT=5432
          POSTGRES__USER=test
          POSTGRES__PASSWORD=test
          POSTGRES__DB=test
          REDIS__HOST=localhost
          REDIS__PORT=6379
          REDIS__DB=0
          YOOKASSA_ENABLED=false
          EOF

      - name: Pytest
        run: uv run pytest
